<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#141414">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="갓플릭스">
<!-- B. PWA manifest (인라인 base64, 아이콘 포함) -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>갓플릭스 – GODFLIX</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#141414; --black:#000; --surface:#1f1f1f; --surface2:#2a2a2a;
  --red:#E50914; --red-h:#b20710; --red-glow:rgba(229,9,20,.4);
  --white:#fff; --g1:#e5e5e5; --g2:#b3b3b3; --g3:#808080; --g4:#404040;
  --green:#46d369; --gold:#f5c518; --blue:#4a9eff;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{
  font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--white);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;padding-bottom:var(--safe-bottom);
}
button,a,[onclick]{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;}
input{outline:none;font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--g4);border-radius:2px;}

/* ═══════════════════════════
   HEADER — 진짜 넷플릭스처럼
═══════════════════════════ */
.nf-header{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4%;
  height:68px;
  background:linear-gradient(to bottom,rgba(0,0,0,.85) 0%,transparent 100%);
  transition:background .3s;
}
.nf-header.solid{background:rgba(20,20,20,.97);backdrop-filter:blur(8px);}
.nf-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;color:var(--red);letter-spacing:3px;
  text-shadow:0 0 20px var(--red-glow);user-select:none;flex-shrink:0;
}
.nf-logo span{color:var(--white);font-size:24px;letter-spacing:1px;}
.header-right{display:flex;align-items:center;gap:16px;}
.user-info{display:flex;align-items:center;gap:10px;}
.user-avatar{
  width:32px;height:32px;border-radius:4px;
  overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,#3a3a3a,#222);
  display:flex;align-items:center;justify-content:center;
}
/* 넷플릭스 스타일 프로필 아이콘 SVG */
.user-avatar svg{width:32px;height:32px;}
.user-name{font-size:13px;font-weight:500;color:var(--g1);}
.btn-logout{
  background:none;border:1px solid rgba(255,255,255,.25);
  color:var(--g2);border-radius:4px;
  padding:5px 12px;font-size:12px;font-weight:600;
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  transition:all .2s;
}
.btn-logout:hover{border-color:var(--white);color:var(--white);}

/* ═══════════════════════════
   LOGIN SCREEN
═══════════════════════════ */
#login-screen{
  position:fixed;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.5) 0%,rgba(0,0,0,.7) 100%),
    radial-gradient(ellipse at 30% 50%,rgba(229,9,20,.15) 0%,transparent 60%),
    #141414;
  z-index:9999;
  display:flex;align-items:center;justify-content:center;
}
.login-bg-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:80px 80px;
}
.login-content{
  position:relative;z-index:2;
  width:100%;max-width:420px;
  padding:0 24px;
  animation:fadeUp .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.login-logo-wrap{text-align:center;margin-bottom:40px;}
.login-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(48px,12vw,72px);
  color:var(--red);letter-spacing:5px;line-height:1;
  text-shadow:0 0 50px var(--red-glow),0 0 100px rgba(229,9,20,.2);
  display:block;
}
.login-sub{
  font-size:12px;letter-spacing:4px;color:var(--g3);
  text-transform:uppercase;margin-top:6px;display:block;
}
.login-sub em{color:var(--white);font-style:normal;}
.login-box{
  background:rgba(0,0,0,.75);
  border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:36px 32px;
  backdrop-filter:blur(24px);
}
.login-title{font-size:28px;font-weight:700;margin-bottom:24px;letter-spacing:-.5px;}
.nf-input{
  display:block;width:100%;
  background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.1);border-radius:6px;
  padding:14px 18px;font-size:16px;
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;color:var(--white);
  transition:border-color .2s,background .2s;
  margin-bottom:12px;-webkit-appearance:none;
}
.nf-input:focus{border-color:var(--white);background:rgba(255,255,255,.09);}
.nf-input::placeholder{color:var(--g4);}
.btn-enter{
  display:block;width:100%;
  background:var(--red);color:var(--white);border:none;border-radius:6px;
  padding:16px;font-size:16px;font-weight:700;
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  letter-spacing:.5px;margin-top:4px;
  transition:background .2s,transform .1s;
}
.btn-enter:hover{background:#f40612;}
.btn-enter:active{transform:scale(.98);}
.btn-enter:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.login-err{
  display:none;color:#ff6b6b;font-size:13px;
  margin-top:12px;line-height:1.5;
}

/* ═══════════════════════════
   MAIN APP
═══════════════════════════ */
#app{display:none;}
#app.show{display:block;}

/* ═══════════════════════════
   HERO BANNER — 풀화면 넷플릭스
═══════════════════════════ */
.hero-banner{
  position:relative;
  width:100%;
  height:clamp(480px, 45vw, 720px);
  overflow:hidden;
  background:var(--black);
}
/* 배경 이미지 레이어 */
.hero-bg-img{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  transform:scale(1.03);
  transition:background-image .4s ease, transform 8s ease;
}
/* 하단 + 좌측 페이드 그라디언트 — 자연스러운 이어짐 */
.hero-vignette{
  position:absolute;inset:0;
  background:
    /* 좌측: 썸네일 글씨 완전 커버 — 55%까지 불투명 유지 */
    linear-gradient(to right, rgba(0,0,0,.98) 0%, rgba(0,0,0,.95) 30%, rgba(0,0,0,.7) 50%, rgba(0,0,0,.15) 65%, transparent 78%),
    linear-gradient(to top, #141414 0%, rgba(20,20,20,.98) 15%, rgba(20,20,20,.7) 30%, rgba(20,20,20,.15) 50%, transparent 65%),
    linear-gradient(to bottom, rgba(0,0,0,.6) 0%, transparent 18%);
}
.hero-content{
  position:absolute;
  bottom:18%;left:4%;
  max-width:52%;
  z-index:10;
}
@media(max-width:700px){
  /* ① 모바일 히어로: 텍스트를 이미지 위에 오버레이 */
  .hero-banner{
    height:auto;
    min-height:0;
    /* 이미지를 배경으로, 텍스트를 위에 얹음 */
    padding-top:52vw; /* 이미지 높이만큼 공간 */
    position:relative;
  }
  .hero-bg-img{
    position:absolute;top:0;left:0;right:0;
    height:72vw; /* 이미지 더 크게 */
  }
  .hero-vignette{
    background:
      /* 하단 강하게 — 텍스트 가독성 */
      linear-gradient(to top, #141414 0%, rgba(20,20,20,.98) 20%, rgba(20,20,20,.75) 40%, rgba(20,20,20,.2) 60%, transparent 75%),
      linear-gradient(to bottom, rgba(0,0,0,.5) 0%, transparent 15%);
  }
  .hero-content{
    /* 이미지 위에 오버레이로 배치 */
    position:absolute;
    bottom:0;left:0;right:0;
    max-width:100%;
    padding:0 4% 20px;
    z-index:10;
  }
  .hero-title-main{
    font-size:clamp(22px,7.5vw,36px);
    letter-spacing:-1px;
    margin-bottom:10px;
    -webkit-line-clamp:2;
    display:-webkit-box;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .hero-title-sub{font-size:11px;font-weight:800;margin-bottom:3px;letter-spacing:.5px;color:var(--g1);}
  .hero-badge{font-size:10px;margin-bottom:8px;padding:2px 8px;}
  .hero-meta{font-size:11px;gap:8px;margin-bottom:10px;}
  .hero-desc{
    font-size:12px;
    -webkit-line-clamp:2;
    margin-bottom:14px;
  }
  .hero-btns{gap:8px;}
  .btn-play{padding:10px 20px;font-size:14px;min-height:44px;}
  .btn-info{padding:10px 16px;font-size:14px;min-height:44px;}
  .hero-dots{bottom:auto;top:calc(72vw - 20px);}
}
.hero-badge{
  display:inline-block;
  font-size:11px;font-weight:700;letter-spacing:2px;
  color:var(--white);text-transform:uppercase;
  margin-bottom:14px;
  background:var(--red);
  padding:3px 10px;border-radius:3px;
}
.hero-title-sub{
  font-size:clamp(14px,1.8vw,18px);
  font-weight:800;
  color:var(--g1);
  margin-bottom:5px;
  letter-spacing:.5px;
}
.hero-title-main{
  /* Pretendard Black — 한글에서 뽝! 하는 굵기 */
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  font-size:clamp(30px,5.8vw,68px);
  font-weight:900;
  letter-spacing:-1.5px;
  line-height:1.05;
  color:var(--white);
  /* 선명한 텍스트 쉐도우로 배경과 분리 */
  text-shadow:
    0 2px 4px rgba(0,0,0,.8),
    0 8px 24px rgba(0,0,0,.6),
    0 0 1px rgba(0,0,0,.9);
  margin-bottom:14px;
  word-break:keep-all; /* 한글 단어 단위로 줄바꿈 */
}
.hero-meta{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  font-size:13px;color:var(--g2);margin-bottom:18px;
}
.hero-match{color:var(--green);font-weight:700;}
.hero-desc{
  font-size:clamp(13px,1.4vw,15px);color:var(--g1);line-height:1.65;
  max-width:480px;margin-bottom:24px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.btn-play{
  display:flex;align-items:center;gap:8px;
  background:var(--white);color:var(--black);border:none;border-radius:6px;
  padding:11px 28px;font-size:16px;font-weight:700;
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  transition:background .15s;min-height:46px;
}
.btn-play:hover{background:rgba(255,255,255,.82);}
.btn-play svg{width:20px;height:20px;flex-shrink:0;}
.btn-info{
  display:flex;align-items:center;gap:8px;
  background:rgba(109,109,110,.65);color:var(--white);border:none;border-radius:6px;
  padding:11px 22px;font-size:15px;font-weight:600;
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  transition:background .15s;min-height:46px;
  backdrop-filter:blur(4px);
}
.btn-info:hover{background:rgba(109,109,110,.45);}

/* ═══════════════════════════
   STATS ROW — 진행률 바 스타일
═══════════════════════════ */
.stats-row{
  padding:20px 4%;
  background:rgba(0,0,0,.3);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.stats-row-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.stats-row-label{
  font-size:14px;font-weight:700;color:var(--g1);
}
.stats-row-label em{color:var(--white);font-style:normal;}
.stats-row-pct{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;line-height:1;color:var(--white);
}
.stats-bar-track{
  height:6px;background:rgba(255,255,255,.1);
  border-radius:3px;overflow:hidden;margin-bottom:12px;
}
.stats-bar-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--red),#ff5733);
  transition:width .8s cubic-bezier(.16,1,.3,1);
  width:0%;
}
.stats-cells{
  display:flex;gap:0;
}
.stat-cell{
  flex:1;text-align:center;
  border-right:1px solid rgba(255,255,255,.06);
  padding:4px 0;
}
.stat-cell:last-child{border-right:none;}
.stat-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;line-height:1;color:var(--red);
}
.stat-num.g{color:var(--green);}
.stat-num.gold{color:var(--gold);}
.stat-label{font-size:10px;color:var(--g3);margin-top:3px;letter-spacing:.3px;}

/* ═══════════════════════════
   CATALOG — 넷플릭스 가로 행
═══════════════════════════ */
.catalog{padding-bottom:60px;}

/* 과정 탭 */
.grade-tabs{
  display:flex;padding:0 4%;gap:0;
  border-bottom:1px solid rgba(255,255,255,.1);
  overflow-x:auto;
  background:var(--bg);
  position:sticky;top:0;z-index:100;
}
.grade-tab{
  background:none;border:none;border-bottom:3px solid transparent;
  padding:12px 20px;font-size:14px;font-weight:700;color:var(--g3);
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;white-space:nowrap;
  transition:color .2s,border-color .2s;margin-bottom:-1px;
  letter-spacing:.5px;
}
.grade-tab:hover{color:var(--g1);}
.grade-tab.active{color:var(--white);border-bottom-color:var(--red);}
.tab-count{
  font-size:11px;margin-left:6px;
  background:rgba(255,255,255,.12);color:var(--g2);
  border-radius:10px;padding:2px 7px;font-weight:700;
}
.grade-tab.active .tab-count{background:var(--red);color:var(--white);}

/* 행 컨테이너 */
.nf-row{margin-bottom:32px;}
.nf-row-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 4% 12px;
}
.nf-row-title{
  font-size:20px;font-weight:700;color:var(--g1);
  letter-spacing:-.3px;
}
.nf-row-title em{color:var(--white);font-style:normal;}
.nf-row-count{font-size:13px;color:var(--g3);}

/* 가로 슬라이드 트랙 */
.nf-slider-wrap{
  position:relative;
}
.nf-slider{
  display:flex;gap:6px;
  padding:4px 4% 16px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.nf-slider::-webkit-scrollbar{display:none;}

/* 슬라이드 화살표 버튼 */
.nf-arrow{
  position:absolute;top:0;bottom:16px;z-index:30;
  width:60px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(to right,rgba(20,20,20,.9),transparent);
  border:none;color:var(--white);font-size:22px;
  opacity:0;transition:opacity .2s;cursor:pointer;
}
.nf-arrow.right{
  right:0;
  background:linear-gradient(to left,rgba(20,20,20,.9),transparent);
}
.nf-slider-wrap:hover .nf-arrow{opacity:1;}
.nf-arrow:hover{background:linear-gradient(to right,rgba(20,20,20,1),transparent);}
.nf-arrow.right:hover{background:linear-gradient(to left,rgba(20,20,20,1),transparent);}

/* 카드 — 가로 슬라이드용 */
.v-card{
  position:relative;border-radius:6px;overflow:hidden;cursor:pointer;
  background:var(--surface);
  flex:0 0 calc(20% - 5px); /* 기본 5열 */
  min-width:160px;
  scroll-snap-align:start;
  transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s;
  aspect-ratio:16/9;
}
@media(max-width:1200px){.v-card{flex:0 0 calc(25% - 5px);}}
@media(max-width:900px){.v-card{flex:0 0 calc(30% - 5px);}}
/* 모바일은 하단 @media(max-width:700px) 에서 처리 */

.v-card:hover{
  transform:scale(1.08) translateY(-4px);
  box-shadow:0 16px 48px rgba(0,0,0,.8),0 0 0 2px rgba(229,9,20,.5);
  z-index:20;
}
/* 터치 기기에서 호버 효과 비활성화 */
@media(hover:none){
  .v-card:hover{transform:none;box-shadow:none;z-index:auto;}
  .v-card:active{transform:scale(.97);transition:transform .1s;}
  .v-play-icon{display:none;}
  /* 모바일에서 카드 정보 항상 표시 (hover 없이) */
  .v-info{opacity:1 !important;transform:none !important;}
}
.v-card.active{box-shadow:0 0 0 2px var(--red),0 0 20px var(--red-glow);}
.v-card.done .v-progress-fill{background:var(--green)!important;}

.v-thumb{
  position:absolute;inset:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
}
.v-thumb-fallback{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.v-fallback-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(24px,3vw,40px);color:rgba(255,255,255,.12);
}
.v-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.75) 100%);
}
.v-badge-grade{
  position:absolute;top:7px;right:7px;z-index:5;
  font-size:9px;font-weight:700;letter-spacing:.5px;
  padding:2px 7px;border-radius:3px;color:var(--white);
}
.v-badge-grade.elem{background:var(--blue);}
.v-badge-grade.mid{background:var(--green);color:#000;}
.v-badge-grade.high{background:var(--red);}
.v-badge-watching{
  position:absolute;top:7px;left:7px;z-index:5;
  font-size:9px;font-weight:700;
  background:var(--green);color:#000;
  padding:2px 7px;border-radius:3px;
}
.v-play-icon{
  position:absolute;inset:0;z-index:4;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.v-card:hover .v-play-icon{opacity:1;}
.v-play-icon svg{width:40px;height:40px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));}
.v-progress{
  position:absolute;bottom:0;left:0;right:0;z-index:6;
  height:3px;background:rgba(255,255,255,.2);
}
.v-progress-fill{height:100%;background:var(--red);transition:width .4s;}
/* 카드 하단 텍스트 — 항상 표시 */
.v-info{
  position:absolute;bottom:0;left:0;right:0;z-index:5;
  padding:32px 10px 9px;
  background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 100%);
}
.v-info-sub{font-size:9px;color:var(--g2);margin-bottom:2px;letter-spacing:.5px;text-transform:uppercase;}
.v-info-title{font-size:11px;font-weight:700;line-height:1.3;color:var(--white);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.v-info-meta{font-size:10px;color:var(--g3);margin-top:3px;}

/* 완료 배지 */
.v-badge-done{
  position:absolute;top:7px;left:7px;z-index:5;
  width:22px;height:22px;border-radius:50%;
  background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#000;
}

/* ═══════════════════════════
   PLAYER OVERLAY
═══════════════════════════ */
#player-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.96);backdrop-filter:blur(8px);
  overflow-y:auto;padding-bottom:var(--safe-bottom);
}
#player-overlay.show{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.player-modal{
  max-width:900px;margin:0 auto;
  padding:calc(var(--safe-top) + 60px) 5% 40px;
  animation:slideUp .3s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.player-close-btn{
  position:fixed;top:calc(var(--safe-top)+14px);right:4%;z-index:600;
  background:rgba(0,0,0,.8);border:1.5px solid rgba(255,255,255,.25);
  color:var(--white);border-radius:50%;width:48px;height:48px;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  /* 모바일 탭 타겟 확보 */
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.player-close-btn:hover{background:rgba(229,9,20,.6);border-color:var(--red);}
.player-close-btn:active{transform:scale(.92);}
@media(max-width:700px){
  .player-close-btn{
    width:56px;height:56px;font-size:20px;
    top:calc(var(--safe-top)+10px);right:3%;
    /* 시각적으로 더 눈에 띄게 */
    background:rgba(0,0,0,.85);
    border:2px solid rgba(255,255,255,.3);
    box-shadow:0 2px 12px rgba(0,0,0,.5);
  }
}
.now-badge{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--red);font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;
}
.now-dot{
  width:6px;height:6px;border-radius:50%;background:var(--red);
  animation:pulse 1.4s ease infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
.player-title-sub{font-size:13px;color:var(--g2);display:block;margin-bottom:4px;letter-spacing:.5px;}
.player-title-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(22px,4vw,36px);letter-spacing:1px;line-height:1.1;
  display:block;margin-bottom:8px;
}
.player-meta{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  font-size:13px;color:var(--g2);margin-bottom:14px;
}
.resume-notice{
  display:none;background:rgba(229,9,20,.1);
  border:1px solid rgba(229,9,20,.2);border-radius:6px;
  padding:10px 16px;font-size:13px;color:#ff8a80;
  margin-bottom:14px;line-height:1.5;
}
.resume-notice.show{display:flex;align-items:center;gap:8px;}
.video-wrap{
  position:relative;width:100%;padding-bottom:56.25%;
  background:var(--black);border-radius:8px;overflow:hidden;
  margin-bottom:14px;box-shadow:0 8px 60px rgba(0,0,0,.8);
}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.prog-section{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:8px;padding:14px 18px;margin-bottom:10px;
}
.prog-label-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;font-size:13px;color:var(--g2);
}
.prog-label-row strong{color:var(--white);}
.prog-track{height:5px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden;}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--red),#ff5733);
  border-radius:3px;transition:width .5s;width:0%;
}
.block-alert{
  display:none;background:rgba(229,9,20,.08);border:1px solid rgba(229,9,20,.3);
  border-radius:8px;padding:12px 16px;font-size:14px;color:#ff7070;
  font-weight:500;text-align:center;margin-bottom:10px;
}
.block-alert.show{display:block;animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.complete-alert{
  display:none;
  background:linear-gradient(135deg,rgba(70,211,105,.1),rgba(70,211,105,.04));
  border:1px solid rgba(70,211,105,.25);border-radius:12px;
  padding:24px 20px 20px;text-align:center;margin-bottom:10px;
}
.complete-alert.show{display:block;animation:popIn .4s cubic-bezier(.16,1,.3,1);}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.complete-icon{font-size:40px;margin-bottom:10px;}
.complete-main{font-size:20px;font-weight:900;color:var(--green);margin-bottom:4px;}
.complete-sub{font-size:13px;color:rgba(70,211,105,.75);margin-bottom:18px;}
.complete-next{
  display:none;
  background:var(--white);color:var(--black);
  border:none;border-radius:8px;
  padding:14px 24px;font-size:15px;font-weight:700;
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  cursor:pointer;transition:background .15s,transform .1s,box-shadow .15s;
  width:100%;margin-top:12px;
  box-shadow:0 4px 16px rgba(255,255,255,.15);
  position:relative;overflow:hidden;
}
.complete-next::before{
  content:'';position:absolute;bottom:0;left:0;
  height:3px;background:var(--green);
  width:0%;transition:none;
}
.complete-next.counting::before{
  width:100%;
  transition:width var(--countdown-duration,5s) linear;
}
.complete-next:hover{background:rgba(255,255,255,.88);box-shadow:0 6px 20px rgba(255,255,255,.2);}
.complete-next:active{transform:scale(.98);}
.complete-next-sub{
  display:none;
  font-size:12px;color:rgba(70,211,105,.7);
  margin-top:8px;line-height:1.5;
}
/* 자동재생 취소 버튼 */
.complete-cancel{
  display:none;
  background:none;border:1px solid rgba(255,255,255,.15);
  color:var(--g3);border-radius:6px;
  padding:6px 14px;font-size:12px;font-weight:600;
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  cursor:pointer;margin-top:8px;transition:all .2s;width:100%;
}
.complete-cancel:hover{border-color:rgba(255,255,255,.3);color:var(--g1);}

/* ═══════════════════════════
   MOBILE FULLSCREEN
═══════════════════════════ */
#fs-overlay{display:none;position:fixed;inset:0;z-index:9999;background:#000;}
#fs-overlay.open{display:block;}
#fs-player{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
#fs-header{
  position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;
  padding:calc(var(--safe-top)+10px) 12px 20px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,transparent 100%);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
}
#fs-title{color:var(--white);font-size:14px;font-weight:700;flex:1;line-height:1.4;pointer-events:none;}
#fs-close-btn{
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.3);
  color:var(--white);border-radius:20px;padding:8px 18px;
  font-size:13px;font-weight:700;font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  min-height:40px;pointer-events:all;
}
#fs-bottom{
  position:absolute;bottom:0;left:0;right:0;z-index:10;pointer-events:none;
  padding:20px 16px calc(var(--safe-bottom)+12px);
  background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 100%);
}
#fs-label{color:rgba(255,255,255,.85);font-size:12px;margin-bottom:6px;}
#fs-watch-bar-wrap{height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;}
#fs-watch-bar{height:100%;background:var(--red);border-radius:2px;width:0%;transition:width .5s;}
#fs-complete{display:none;color:var(--green);font-weight:700;font-size:13px;margin-top:5px;}

/* ═══════════════════════════
   TOAST
═══════════════════════════ */
.toast{
  position:fixed;bottom:calc(24px + var(--safe-bottom));
  left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(20,20,20,.95);border:1px solid rgba(255,255,255,.1);
  color:var(--white);padding:12px 20px;border-radius:28px;
  font-size:14px;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  transition:transform .28s cubic-bezier(.16,1,.3,1);
  z-index:8000;max-width:92vw;text-align:center;
  backdrop-filter:blur(10px);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;
  white-space:normal; /* HTML 버튼 포함 위해 nowrap 제거 */
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ═══════════════════════════
   LOADING
═══════════════════════════ */
.loading-state{padding:48px 20px;text-align:center;color:var(--g3);font-size:14px;}
.loading-spinner{
  width:32px;height:32px;border:3px solid rgba(255,255,255,.08);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .75s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important;}

/* ═══════════════════════════
   1. 로그인 인트로 애니메이션
═══════════════════════════ */
#intro-screen{
  position:fixed;inset:0;z-index:99999;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
#intro-screen.done{display:none;}
.intro-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,15vw,120px);
  color:var(--red);
  letter-spacing:8px;
  opacity:0;
  transform:scale(1.4);
  animation:introAnim 2.4s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes introAnim{
  0%  {opacity:0;transform:scale(1.4);}
  30% {opacity:1;transform:scale(1);
       text-shadow:0 0 80px rgba(229,9,20,.9),0 0 160px rgba(229,9,20,.5);}
  70% {opacity:1;transform:scale(1);
       text-shadow:0 0 40px rgba(229,9,20,.6),0 0 80px rgba(229,9,20,.3);}
  100%{opacity:0;transform:scale(.95);text-shadow:none;}
}
#intro-screen::after{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(229,9,20,.12) 0%,transparent 70%);
  opacity:0;
  animation:introGlow 2.4s ease forwards;
}
@keyframes introGlow{
  0%  {opacity:0;}
  30% {opacity:1;}
  100%{opacity:0;}
}

/* ═══════════════════════════
   2. 상세 정보 모달
═══════════════════════════ */
#detail-modal{
  display:none;position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(6px);
  align-items:center;justify-content:center;
  padding:20px;
  animation:fadeIn .25s ease;
}
#detail-modal.show{display:flex;}
.detail-box{
  background:#181818;
  border-radius:10px;
  max-width:780px;width:100%;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 20px 80px rgba(0,0,0,.8);
  animation:slideUp .3s cubic-bezier(.16,1,.3,1) both;
  position:relative;
}
.detail-thumb{
  width:100%;aspect-ratio:16/9;
  background:var(--black);
  background-size:cover;background-position:center;
  position:relative;border-radius:10px 10px 0 0;overflow:hidden;flex-shrink:0;
}
.detail-thumb-vignette{
  position:absolute;inset:0;
  background:linear-gradient(to top,#181818 0%,rgba(24,24,24,.4) 50%,transparent 100%);
}
.detail-close{
  position:absolute;top:14px;right:14px;z-index:10;
  background:rgba(0,0,0,.6);border:1.5px solid rgba(255,255,255,.25);
  color:var(--white);border-radius:50%;width:36px;height:36px;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.detail-close:hover{background:var(--red);border-color:var(--red);}
.detail-body{padding:20px 28px 28px;}
.detail-title-sub{font-size:13px;color:var(--g2);margin-bottom:4px;letter-spacing:.5px;}
.detail-title-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(24px,4vw,40px);
  letter-spacing:1px;line-height:1.1;margin-bottom:12px;
}
.detail-meta-row{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  font-size:13px;color:var(--g2);margin-bottom:18px;
}
.detail-desc{
  font-size:14px;color:var(--g1);line-height:1.75;
  margin-bottom:20px;
}
.detail-progress{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:14px 18px;margin-bottom:20px;
}
.detail-prog-label{
  display:flex;justify-content:space-between;
  font-size:13px;color:var(--g2);margin-bottom:8px;
}
.detail-prog-label strong{color:var(--white);}
.detail-prog-track{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.detail-prog-fill{height:100%;background:linear-gradient(90deg,var(--red),#ff5733);border-radius:3px;transition:width .6s;}
.detail-btns{display:flex;gap:10px;flex-wrap:wrap;}
@media(max-width:600px){
  .detail-body{padding:16px 18px 24px;}
  .detail-box{border-radius:8px;}
}
/* ═══════════════════════════════════
   모바일 최적화 — 전면 재설계
   기준: 375px (iPhone SE) ~ 430px (iPhone 15 Pro Max)
═══════════════════════════════════ */
@media(max-width:700px){

  /* ── 헤더 ── */
  .nf-header{height:52px;padding:0 4%;}
  .nf-logo{font-size:24px;letter-spacing:2px;}
  .user-name{display:none;} /* 이름 숨기고 아이콘만 */
  .btn-logout{padding:6px 10px;font-size:11px;}

  /* ── 히어로: 모바일 전용 레이아웃 ──
     썸네일을 배경 전체로 쓰고 하단에 텍스트 배치 */
  .hero-banner{
    height:auto;
    min-height:0;
    padding-top:56.25vw; /* 16:9 비율 유지 */
    position:relative;
  }
  .hero-bg-img{
    position:absolute;
    top:0;left:0;right:0;
    height:56.25vw;
    transform:none; /* 모바일에서 scale 제거 */
  }
  .hero-vignette{
    background:
      linear-gradient(to top, #141414 0%, rgba(20,20,20,.98) 20%, rgba(20,20,20,.6) 45%, transparent 65%),
      linear-gradient(to bottom, rgba(0,0,0,.5) 0%, transparent 12%);
  }
  .hero-content{
    position:relative;
    bottom:auto;left:auto;
    max-width:100%;
    padding:16px 4% 20px;
    z-index:10;
  }
  .hero-badge{font-size:10px;margin-bottom:8px;padding:2px 8px;}
  .hero-title-sub{font-size:13px;font-weight:800;margin-bottom:3px;letter-spacing:.5px;color:var(--g1);}
  .hero-title-main{
    font-size:clamp(24px,7.5vw,36px);
    letter-spacing:-1px;
    margin-bottom:8px;
    -webkit-line-clamp:2;
    display:-webkit-box;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .hero-meta{font-size:12px;gap:8px;margin-bottom:10px;}
  .hero-desc{
    font-size:13px;
    -webkit-line-clamp:2;
    margin-bottom:16px;
  }
  .hero-btns{gap:8px;}
  .btn-play{
    padding:10px 20px;font-size:14px;min-height:44px;
  }
  .btn-info{
    padding:10px 16px;font-size:14px;min-height:44px;
  }
  .hero-dots{bottom:auto;top:calc(56.25vw - 20px);}

  /* ── 통계 바: 모바일 컴팩트 ── */
  .stats-row{padding:12px 4%;}
  .stats-row-top{margin-bottom:8px;}
  .stats-row-label{font-size:13px;}
  .stats-row-pct{font-size:22px;}
  .stats-bar-track{margin-bottom:10px;}
  .stat-num{font-size:22px;}
  .stat-label{font-size:9px;}

  /* ── 검색창 ── */
  .search-bar-wrap{padding:10px 3% 0;}
  .search-input{font-size:16px;} /* iOS 자동 zoom 방지 */
  .search-bar{padding:0 12px;}

  /* ── 과정 탭 ── */
  .grade-tabs{padding:0 3%;}
  .grade-tab{padding:11px 14px;font-size:13px;}

  /* ── 행 헤더 ── */
  .nf-row-header{padding:20px 4% 10px;}
  .nf-row-title{font-size:17px;}

  /* ── 카드: 모바일에서 크게 (2.2개 보이도록) ── */
  .v-card{
    flex:0 0 42vw; /* 2.2개 보임 */
    min-width:0;
  }
  .nf-slider{
    padding:4px 4% 12px;
    gap:8px;
    /* 모멘텀 스크롤 강화 */
    -webkit-overflow-scrolling:touch;
    scroll-behavior:smooth;
    overscroll-behavior-x:contain;
  }
  /* 모바일에서 화살표 숨김 (스와이프로 대체) */
  .nf-arrow{display:none;}

  /* 카드 텍스트 모바일 최적화 */
  .v-info{padding:20px 8px 7px;}
  .v-info-title{font-size:11px;-webkit-line-clamp:1;}
  .v-info-meta{font-size:9px;}
  .v-info-sub{font-size:8px;}
  .v-badge-grade{font-size:8px;padding:2px 5px;}

  /* ── 툴바 ── */
  .catalog-toolbar{padding:8px 4% 0;}
  .btn-tool{padding:8px 12px;font-size:11px;min-height:36px;}

  /* ── 플레이어 모달 ── */
  .player-modal{padding:calc(var(--safe-top)+52px) 4% 32px;}
  .player-title-main{font-size:22px;}

  /* ── 상세 모달 ── */
  .detail-thumb{aspect-ratio:16/9;}
  .detail-body{padding:14px 16px 20px;}
  .detail-title-main{font-size:22px;}
  .detail-btns .btn-play{min-height:44px;width:100%;justify-content:center;}

  /* ── 비밀번호 모달 ── */
  .pw-box{padding:20px;}

  /* ── 로그인 ── */
  .login-content{padding:0 16px;}
  .login-box{padding:24px 20px;}
  .login-title{font-size:22px;}

  /* ── 토스트 ── */
  .toast{
    left:4%;right:4%;
    transform:translateY(80px);
    white-space:normal;
    text-align:center;
    max-width:none;
  }
  .toast.show{transform:translateY(0);}
}

/* 아주 작은 화면 (SE 등 375px 이하) */
@media(max-width:380px){
  .v-card{flex:0 0 48vw;}
  .hero-title-main{font-size:20px;}
}

/* ════════════════════════════
   1. 로딩 스켈레톤
════════════════════════════ */
.skeleton-row{margin-bottom:32px;}
.skeleton-row-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 4% 12px;
}
.skel{
  background:linear-gradient(90deg,
    rgba(255,255,255,.06) 25%,
    rgba(255,255,255,.12) 50%,
    rgba(255,255,255,.06) 75%);
  background-size:400% 100%;
  animation:shimmer 1.4s ease infinite;
  border-radius:4px;
}
@keyframes shimmer{
  0%{background-position:100% 0}
  100%{background-position:-100% 0}
}
.skel-title{height:18px;width:160px;border-radius:4px;}
.skel-count{height:14px;width:60px;border-radius:4px;}
.skeleton-cards{
  display:flex;gap:6px;padding:4px 4% 16px;overflow:hidden;
}
.skel-card{
  flex:0 0 calc(20% - 5px);min-width:160px;
  aspect-ratio:16/9;border-radius:6px;
}
@media(max-width:700px){
  .skel-card{flex:0 0 42vw;}
}

/* ════════════════════════════
   3. 시청 완료 컨페티
════════════════════════════ */
#confetti-canvas{
  position:fixed;inset:0;z-index:9998;
  pointer-events:none;
  opacity:0;
  transition:opacity .3s;
}
#confetti-canvas.active{opacity:1;}

/* 공지사항 배너 — 헤더 바로 아래 고정 */
#notice-banner{
  display:none;
  position:fixed;
  top:68px; /* 헤더 높이 */
  left:0;right:0;
  z-index:250; /* 헤더(300) 아래, 일반 콘텐츠 위 */
  background:linear-gradient(90deg,rgba(229,9,20,.18),rgba(229,9,20,.1));
  border-bottom:1px solid rgba(229,9,20,.25);
  padding:9px 4%;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  animation:slideDown .3s cubic-bezier(.16,1,.3,1);
}

<script>
/* ─ CONFIG ─ */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxygUx-v4SAwg_MSa6SmZJNqjZZFRFWNkyvRtWgFa8k70_fHeVOD-0x2xYvoJyolJhC/exec';

/* ─ STATE ─ */
let VIDEOS=[],studentList=[],progressMap={};
let userName='',currentVideo=null,currentIndex=-1;
let startTime=null,maxReachedSec=0,lastPositionSec=0,videoDuration=0;
let replayCount=0,completed=false,isPlaying=false;
let jumpBlock=false,recordSent=false;
let progressSaveInterval=null,watchedMinutesSinceLastRecord=0;
let featuredIndex=0,currentGrade='전체';
const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

/* ─ HELPERS ─ */
function parseTitle(t){
  const m=t.match(/^((?:초등|중등|고등)\s*\d+과)\s+(.+)$/);if(m)return{sub:m[1],main:m[2]};
  const m2=t.match(/^(\d+과)\s+(.+)$/);if(m2)return{sub:m2[1],main:m2[2]};
  return{sub:'',main:t};
}
function detectGrade(v){
  if(v.grade)return v.grade;
  if(/초등/.test(v.title))return'초등';
  if(/중등/.test(v.title))return'중등';
  if(/고등/.test(v.title))return'고등';
  return'기타';
}
function gradeClass(g){return g==='초등'?'elem':g==='중등'?'mid':'high';}
function extractVimeoId(url){
  if(!url)return'';
  const s=url.trim();
  if(/^\d+$/.test(s))return s;
  const m=s.match(/(?:vimeo\.com\/(?:video\/)?|player\.vimeo\.com\/video\/)(\d+)/);
  return m?m[1]:s;
}
function fmtSec(sec){
  const s=Math.floor(sec),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  if(h>0)return`${h}시간 ${m}분 ${ss}초`;
  if(m>0)return`${m}분 ${ss}초`;
  return`${ss}초`;
}
function fmtDate(raw){
  if(!raw)return'';
  const D=['일','월','화','수','목','금','토'];
  if(/^\d{4}\.\s*\d{1,2}/.test(raw))return raw;
  const d=new Date(raw);
  if(isNaN(d.getTime()))return raw;
  return`${d.getUTCFullYear()}. ${d.getUTCMonth()+1}. ${d.getUTCDate()}. (${D[d.getUTCDay()]})`;
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

let currentSearchQuery = '';

/* ─ 검색 ─ */
function onSearch(q) {
  currentSearchQuery = q.trim();
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.classList.toggle('show', currentSearchQuery.length > 0);
  renderCatalog();
  // 검색 결과 수 표시
  const countEl = document.getElementById('search-count');
  if (countEl) {
    if (currentSearchQuery) {
      const hits = filteredVideos().length;
      countEl.textContent = hits > 0 ? `"${currentSearchQuery}" 검색 결과 ${hits}개` : `"${currentSearchQuery}"에 대한 결과가 없습니다.`;
    } else {
      countEl.textContent = '';
    }
  }
}

function clearSearch() {
  currentSearchQuery = '';
  const inp = document.getElementById('search-input');
  if (inp) inp.value = '';
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.classList.remove('show');
  const countEl = document.getElementById('search-count');
  if (countEl) countEl.textContent = '';
  renderCatalog();
}
function gasApi(params){
  return new Promise((resolve,reject)=>{
    const cb='_cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const s=document.createElement('script');
    s.src=SHEET_URL+'?'+new URLSearchParams({...params,callback:cb});
    const t=setTimeout(()=>{cleanup();reject(new Error('timeout'));},15000);
    const cleanup=()=>{delete window[cb];s.parentNode&&s.parentNode.removeChild(s);};
    window[cb]=d=>{clearTimeout(t);cleanup();resolve(d);};
    s.onerror=()=>{clearTimeout(t);cleanup();reject(new Error('load error'));};
    document.head.appendChild(s);
  });
}

/* ─ INIT ─ */
async function init(){await Promise.all([loadStudents(),loadVideos()]);}

async function loadStudents(){
  try{const j=await gasApi({action:'getAllUsers'});studentList=j.userObjects||j.users||[];}
  catch(e){studentList=[];}
}
async function loadVideos(){
  renderSkeleton(2,5); // 로딩 중 스켈레톤 표시
  try{
    const j=await gasApi({action:'getVideos'});
    if(j.result==='success'&&j.videos?.length){
      VIDEOS=j.videos;buildGradeTabs();renderCatalog();updateFeatured(0);
      initHeroCarousel();
    }else{
      document.getElementById('rows-container').innerHTML='<div class="loading-state">등록된 강의가 없습니다.</div>';
    }
  }catch(e){
    document.getElementById('rows-container').innerHTML='<div class="loading-state">목록을 불러오지 못했습니다.</div>';
  }
}

/* ─ LOGIN ─ */
async function confirmLogin(){
  const idVal=document.getElementById('id-input').value.trim();
  const pwVal=document.getElementById('pw-input').value.trim();
  const btn=document.getElementById('confirm-btn');
  const err=document.getElementById('error-msg');
  if(!idVal||!pwVal){showToast('아이디와 비밀번호를 입력해 주세요');return;}
  err.style.display='none';btn.disabled=true;btn.textContent='확인 중…';

  let matched=null;
  if(studentList.length===0){matched={name:idVal};}
  else if(typeof studentList[0]==='object'){
    matched=studentList.find(s=>s.id===idVal&&String(s.password)===pwVal);
    if(!matched)matched=studentList.find(s=>s.name===idVal&&String(s.password)===pwVal);
  }else{
    matched=studentList.includes(idVal)?{name:idVal}:null;
  }

  if(!matched){
    err.textContent='❌ 등록된 수강생 명단에 없는 아이디입니다.';
    err.style.display='block';btn.disabled=false;btn.textContent='입장하기';return;
  }
  userName=matched.name||idVal;
  try{const j=await gasApi({action:'getAllProgress',name:userName});progressMap=j.data||{};}
  catch(e){progressMap={};}

  btn.disabled=false;btn.textContent='입장하기';
  document.getElementById('header-name').textContent=userName+' 님';
  document.getElementById('header-user-area').style.display='flex';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('show');
  document.getElementById('stats-row').style.display='block'; // ② 로그인 후 표시
  document.getElementById('search-bar-wrap').style.display='block'; // ③ 검색창 표시
  renderCatalog(); updateStats(); updateFeatured(0); renderRecentRow();
  initHeroCarousel(); loadNotice();
  // B. PWA 설치 유도 (3초 후)
  setTimeout(showPwaPrompt, 3000);
  showToast('환영합니다, '+userName+' 님!');
}

function goToLogin(){
  if(currentVideo&&maxReachedSec>5){saveRecord(true);saveProgress();}
  clearInterval(progressSaveInterval);closePlayer();
  document.getElementById('app').classList.remove('show');
  document.getElementById('stats-row').style.display='none';
  document.getElementById('search-bar-wrap').style.display='none';
  document.getElementById('search-input').value='';
  currentSearchQuery='';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('header-user-area').style.display='none';
  document.getElementById('id-input').value='';
  document.getElementById('pw-input').value='';
  userName='';progressMap={};currentVideo=null;
}
document.getElementById('id-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pw-input').focus();});
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmLogin();});

/* ─ TABS ─ */
function buildGradeTabs(){
  const grades=['전체'];
  const found=new Set(VIDEOS.map(v=>detectGrade(v)));
  ['초등','중등','고등'].forEach(g=>{if(found.has(g))grades.push(g);});
  if(found.has('기타'))grades.push('기타');
  const c=document.getElementById('grade-tabs');c.innerHTML='';
  grades.forEach(g=>{
    const count=g==='전체'?VIDEOS.length:VIDEOS.filter(v=>detectGrade(v)===g).length;
    const label=g==='전체'?'전체':g==='초등'?'초등 과정':g==='중등'?'중등 과정':g==='고등'?'고등 과정':g;
    const btn=document.createElement('button');
    btn.className='grade-tab'+(g===currentGrade?' active':'');
    btn.dataset.grade=g;
    btn.innerHTML=`${label} <span class="tab-count">${count}</span>`;
    btn.onclick=()=>switchGrade(g);
    c.appendChild(btn);
  });
}
function switchGrade(g){
  currentGrade=g;
  document.querySelectorAll('.grade-tab').forEach(t=>t.classList.toggle('active',t.dataset.grade===g));
  // ① 탭 전환 시 검색어 초기화
  if(currentSearchQuery) clearSearch();
  else renderCatalog();
  const f=filteredVideos();
  if(f.length>0){const ri=VIDEOS.indexOf(f[0]);if(ri>=0)updateFeatured(ri);}
}
function filteredVideos(){
  let list = currentGrade==='전체' ? VIDEOS : VIDEOS.filter(v=>detectGrade(v)===currentGrade);
  // 검색어 필터
  if (currentSearchQuery) {
    const q = currentSearchQuery.toLowerCase();
    list = list.filter(v =>
      (v.title||'').toLowerCase().includes(q) ||
      (v.lecturer||'').toLowerCase().includes(q) ||
      (v.description||'').toLowerCase().includes(q)
    );
  }
  return list;
}

/* ─ STATS ─ */
function updateStats(){
  if(!VIDEOS.length)return;
  const total=VIDEOS.length;
  let done=0,ing=0;
  VIDEOS.forEach(v=>{
    const p=progressMap[v.id];
    if(!p)return;
    const maxR=parseFloat(p.maxReached)||0;
    const lastP=parseFloat(p.lastPosition)||0;
    // 완료: maxReached가 duration의 90% 이상이거나 completed 플래그
    if(p.completed||(maxR>30&&maxR>=lastP*.9&&lastP>30)){done++;}
    else if(maxR>30){ing++;}
  });
  const none=total-done-ing;
  const pct=total>0?Math.round(done/total*100):0;

  document.getElementById('st-total').textContent=total;
  document.getElementById('st-done').textContent=done;
  document.getElementById('st-ing').textContent=ing;
  document.getElementById('st-none').textContent=Math.max(none,0);
  document.getElementById('stats-pct').textContent=pct+'%';
  document.getElementById('stats-bar-fill').style.width=pct+'%';
  if(userName){
    document.getElementById('stats-label').innerHTML=
      '<em>'+userName+'</em> 님의 수강 현황';
  }
}

/* ─ HERO ─ */
function updateFeatured(index){
  if(!VIDEOS.length)return;
  featuredIndex=index;
  const v=VIDEOS[index];
  const prog=progressMap[v.id];
  const maxR=prog?(parseFloat(prog.maxReached)||0):0;
  const grade=detectGrade(v);
  const parsed=parseTitle(v.title);

  // 배경 이미지
  const bg=document.getElementById('hero-bg');
  if(v.thumbnail){
    bg.style.backgroundImage=`url('${v.thumbnail}')`;
    bg.style.backgroundPosition='center 20%';
  }else{
    const colors={초등:'#051525',중등:'#051a0f',고등:'#1a0505',전체:'#0a0505',기타:'#0a0505'};
    bg.style.backgroundImage=`radial-gradient(ellipse at 70% 40%, ${colors[grade]||'#141414'} 0%, #141414 70%)`;
  }

  document.getElementById('hero-badge').textContent=grade==='전체'?'갓플릭스 강의실':grade+' 과정';
  document.getElementById('hero-title-sub').textContent=parsed.sub;
  document.getElementById('hero-title-main').textContent=parsed.main||v.title;
  document.getElementById('hero-match').textContent=maxR>5?'▶ '+Math.round(maxR/60)+'분 시청':'새 강의';
  document.getElementById('hero-date').textContent=v.date?'📅 '+fmtDate(v.date):'';
  document.getElementById('hero-lecturer').textContent=v.lecturer?'👤 '+v.lecturer:'';
  document.getElementById('hero-desc').textContent=v.description||(parsed.main+' 강의를 시청하세요.');
}
function playFeatured(){if(!userName){showToast('먼저 로그인해 주세요');return;}selectVideo(featuredIndex);}
function scrollToCatalog(){document.getElementById('catalog').scrollIntoView({behavior:'smooth'});}

/* ─ CATALOG — 넷플릭스 가로 행 ─ */
function makeCard(v, vi, i){
  const prog=progressMap[v.id];
  const maxR=prog?(parseFloat(prog.maxReached)||0):0;
  const isDone=prog&&(prog.completed||(maxR>30&&(parseFloat(prog.lastPosition)||0)>30));
  const isWatched=!isDone&&maxR>30;
  const grade=detectGrade(v);
  const gc=gradeClass(grade);
  const parsed=parseTitle(v.title);
  const thumbStyle=v.thumbnail?`background-image:url('${v.thumbnail}')`:
    `background:linear-gradient(135deg,#1a1a1a,#2d2d2d)`;

  const card=document.createElement('div');
  card.className='v-card'+(i===currentIndex?' active':'')+(isDone?' done':'');
  card.id='vc-'+i;
  card.innerHTML=`
    <div class="v-thumb" style="${thumbStyle}"></div>
    ${!v.thumbnail?`<div class="v-thumb-fallback"><div class="v-fallback-num">${vi+1}</div></div>`:''}
    <div class="v-overlay"></div>
    <div class="v-badge-grade ${gc}">${grade}</div>
    ${isDone?'<div class="v-badge-done">✓</div>':''}
    ${isWatched&&!isDone?'<div class="v-badge-watching">시청중</div>':''}
    <div class="v-play-icon">
      <svg viewBox="0 0 24 24" fill="white">
        <circle cx="12" cy="12" r="12" fill="rgba(0,0,0,.5)"/>
        <path d="M10 8l6 4-6 4V8z"/>
      </svg>
    </div>
    <div class="v-progress"><div class="v-progress-fill" id="cpf-${i}" style="width:${isDone?100:0}%;${isDone?'background:var(--green);':''}"></div></div>
    <div class="v-info">
      ${parsed.sub?`<div class="v-info-sub">${parsed.sub}</div>`:''}
      <div class="v-info-title">${parsed.main||v.title}</div>
      <div class="v-info-meta">${v.date?fmtDate(v.date):''}${v.lecturer?' · '+v.lecturer:''}</div>
    </div>`;
  card.addEventListener('click', () => { updateFeatured(i); selectVideo(i); });
  // 데스크탑에서만 hover 시 히어로 변경 (터치 기기에서는 불필요)
  if (window.matchMedia('(hover:hover)').matches) {
    card.addEventListener('mouseenter', () => updateFeatured(i));
  }
  return card;
}

function makeRow(title, videos, globalIndexFn){
  if(!videos.length) return null;

  const row=document.createElement('div');
  row.className='nf-row';

  // 헤더
  const hdr=document.createElement('div');
  hdr.className='nf-row-header';
  hdr.innerHTML=`<div class="nf-row-title">${title}</div><div class="nf-row-count">${videos.length}개 강의</div>`;
  row.appendChild(hdr);

  // 슬라이더 래퍼
  const wrap=document.createElement('div');
  wrap.className='nf-slider-wrap';

  // 좌우 화살표
  const arrowL=document.createElement('button');
  arrowL.className='nf-arrow left';
  arrowL.innerHTML='&#8249;';
  arrowL.setAttribute('aria-label','이전');

  const arrowR=document.createElement('button');
  arrowR.className='nf-arrow right';
  arrowR.innerHTML='&#8250;';
  arrowR.setAttribute('aria-label','다음');

  const slider=document.createElement('div');
  slider.className='nf-slider';

  videos.forEach((v,vi)=>{
    const i=globalIndexFn(v);
    slider.appendChild(makeCard(v,vi,i));
  });

  // 스크롤 버튼
  const scrollAmt=()=>slider.clientWidth*0.75;
  arrowL.onclick=()=>slider.scrollBy({left:-scrollAmt(),behavior:'smooth'});
  arrowR.onclick=()=>slider.scrollBy({left:scrollAmt(),behavior:'smooth'});

  wrap.appendChild(arrowL);
  wrap.appendChild(slider);
  wrap.appendChild(arrowR);
  row.appendChild(wrap);
  return row;
}

function renderCatalog(){
  const container=document.getElementById('rows-container');
  container.innerHTML='';

  const videos=filteredVideos();
  if(!videos.length){
    const msg=currentSearchQuery
      ?`"${currentSearchQuery}" 검색 결과가 없습니다.`
      :'해당 과정 강의가 없습니다.';
    container.innerHTML=`<div class="loading-state">${msg}</div>`;
    return;
  }

  const globalIdx=v=>VIDEOS.indexOf(v);

  // 검색 중이면 단일 결과 행으로 표시
  if(currentSearchQuery){
    const row=makeRow(`🔍 검색 결과 <em>${videos.length}개</em>`, videos, globalIdx);
    if(row) container.appendChild(row);
    return;
  }

  if(currentGrade==='전체'){
    // 전체 탭: 과정별로 행 분리
    const gradeOrder=['고등','중등','초등','기타'];
    const found=new Set(videos.map(v=>detectGrade(v)));
    gradeOrder.filter(g=>found.has(g)).forEach(g=>{
      const gVideos=videos.filter(v=>detectGrade(v)===g);
      const labels={고등:'고등 과정',중등:'중등 과정',초등:'초등 과정',기타:'기타'};
      const row=makeRow(labels[g]||g, gVideos, globalIdx);
      if(row) container.appendChild(row);
    });
  } else {
    // 특정 과정 탭: 단일 행
    const labelMap={초등:'초등 과정',중등:'중등 과정',고등:'고등 과정'};
    const row=makeRow(
      userName?`<em>${userName}</em> 님의 ${labelMap[currentGrade]||currentGrade} 강의`
              :`${labelMap[currentGrade]||currentGrade} 강의`,
      videos, globalIdx
    );
    if(row) container.appendChild(row);
  }
}

/* ─ SELECT & PLAY ─ */
async function selectVideo(index){
  if(!userName){showToast('먼저 로그인해 주세요');return;}
  if(currentVideo&&maxReachedSec>5){saveRecord(true);saveProgress();}
  clearInterval(progressSaveInterval);

  currentVideo=VIDEOS[index];currentIndex=index;
  startTime=new Date().toLocaleString('ko-KR');
  replayCount=0;completed=false;recordSent=false;
  isPlaying=false;jumpBlock=false;videoDuration=0;
  lastPositionSec=0;watchedMinutesSinceLastRecord=0;

  const prog=progressMap[currentVideo.id];
  maxReachedSec=prog?(parseFloat(prog.maxReached)||0):0;
  const resumeFrom=prog?(parseFloat(prog.lastPosition)||0):0;

  document.querySelectorAll('.v-card').forEach((el,i)=>
    el.classList.toggle('active',parseInt(el.id.replace('vc-',''))===index));

  const parsed=parseTitle(currentVideo.title);
  document.getElementById('player-title-sub').textContent=parsed.sub;
  document.getElementById('player-title-main').textContent=parsed.main||currentVideo.title;

  let meta=[];
  if(currentVideo.date)meta.push('📅 '+fmtDate(currentVideo.date));
  if(currentVideo.lecturer)meta.push('👤 '+currentVideo.lecturer);
  document.getElementById('player-meta').textContent=meta.join('  ·  ');

  const rn=document.getElementById('resume-notice');
  if(resumeFrom>10){
    document.getElementById('resume-text').textContent='이전에 '+fmtSec(resumeFrom)+'까지 시청했습니다. 이어서 재생합니다.';
    rn.classList.add('show');
  }else{rn.classList.remove('show');}

  document.getElementById('complete-box').classList.remove('show');
  document.getElementById('block-box').classList.remove('show');
  document.getElementById('watch-bar').style.width='0%';
  document.getElementById('watch-pct').textContent='0%';
  document.getElementById('watch-label').textContent='로딩 중…';

  window._pendingResume=resumeFrom>10?resumeFrom:0;
  window._pendingMaxReached=maxReachedSec;

  document.getElementById('player-overlay').classList.add('show');
  document.body.style.overflow='hidden';

  if(isMobile){openFullscreen(extractVimeoId(currentVideo.url),currentVideo.title);}
  else{
    document.getElementById('vimeo-player').src=
      `https://player.vimeo.com/video/${extractVimeoId(currentVideo.url)}?badge=0&autopause=0&app_id=58479&api=1&player_id=vimeo-player&autoplay=1&playsinline=1`;
  }

  progressSaveInterval=setInterval(()=>{
    saveProgress();watchedMinutesSinceLastRecord+=10/60;
    if(maxReachedSec>30&&watchedMinutesSinceLastRecord>=2){saveRecord(false);watchedMinutesSinceLastRecord=0;}
  },10000);
}

function closePlayer(){
  // 자동재생 타이머 정리
  _autoPlayCancelled = true;
  clearInterval(_autoPlayTimer);
  const nb = document.getElementById('complete-next-btn');
  if (nb) nb.classList.remove('counting');
  document.getElementById('player-overlay').classList.remove('show');
  document.getElementById('vimeo-player').src='';
  document.body.style.overflow='';
  if(currentVideo&&maxReachedSec>5){saveRecord(true);saveProgress();}
  clearInterval(progressSaveInterval);
}

/* ─ MOBILE FS ─ */
function openFullscreen(videoId,title){
  const o=document.getElementById('fs-overlay');
  document.getElementById('fs-title').textContent=title;
  document.getElementById('fs-label').textContent='로딩 중…';
  document.getElementById('fs-watch-bar').style.width='0%';
  document.getElementById('fs-complete').style.display='none';
  document.getElementById('vimeo-player').src='';
  document.getElementById('fs-player').src=
    `https://player.vimeo.com/video/${videoId}?badge=0&autopause=0&app_id=58479&api=1&player_id=fs-player&autoplay=1&quality=auto`;
  o.classList.add('open');
  if(o.requestFullscreen)o.requestFullscreen().catch(()=>{});
  else if(o.webkitRequestFullscreen)o.webkitRequestFullscreen();
  if(screen.orientation?.lock)screen.orientation.lock('landscape').catch(()=>{});
  if(navigator.wakeLock)navigator.wakeLock.request('screen').catch(()=>{});
}
function closeFullscreen(){
  document.getElementById('fs-overlay').classList.remove('open');
  document.getElementById('fs-player').src='';
  if(screen.orientation?.unlock)screen.orientation.unlock();
  if(document.exitFullscreen)document.exitFullscreen().catch(()=>{});
  else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
}

/* ─ VIMEO ─ */
window.addEventListener('message',function(e){
  if(!e.data||typeof e.data!=='string')return;
  let d;try{d=JSON.parse(e.data);}catch(err){return;}
  const ev=d.event,pid=d.player_id,isFs=(pid==='fs-player');

  if(ev==='ready'){
    maxReachedSec=window._pendingMaxReached||0;
    ['play','pause','finish','seek','playProgress'].forEach(n=>sendPlayer('addEventListener',n,isFs));
    // 이어보기: 모바일(fs)과 데스크탑 모두 처리
    if(window._pendingResume>0){
      const resumeTo=window._pendingResume;
      window._pendingResume=0;
      setTimeout(()=>{
        jumpBlock=true;
        sendPlayer('setCurrentTime',resumeTo,isFs);
        setTimeout(()=>{jumpBlock=false;},1500);
      },1000); // Vimeo가 완전히 준비된 후 이동
    }
  }
  if(ev==='play')isPlaying=true;
  if(ev==='pause')isPlaying=false;
  if(ev==='playProgress'){
    const t=parseFloat(d.data.seconds)||0,dur=parseFloat(d.data.duration)||0;
    if(dur>0)videoDuration=dur;
    const fw=dur>0&&maxReachedSec>=dur*.95;
    if(!fw&&!jumpBlock&&t>maxReachedSec+10){blockJump(isFs);return;}
    if(jumpBlock)return;
    lastPositionSec=t;
    if(t>maxReachedSec){
      maxReachedSec=t;
      if(currentVideo){
        if(!progressMap[currentVideo.id])progressMap[currentVideo.id]={lastPosition:0,maxReached:0,duration:0};
        progressMap[currentVideo.id].maxReached=Math.max(progressMap[currentVideo.id].maxReached,maxReachedSec);
        if(dur>0)progressMap[currentVideo.id].duration=Math.floor(dur);
      }
    }
    // duration 알면 정확한 %, 모르면 maxReached 기준 추정
    const pct=dur>0?Math.min(maxReachedSec/dur*100,100):0;
    document.getElementById('watch-bar').style.width=pct+'%';
    document.getElementById('watch-pct').textContent=Math.round(pct)+'%';
    document.getElementById('watch-label').textContent='시청 중 ('+fmtSec(t)+' / '+fmtSec(dur)+')';
    document.getElementById('fs-watch-bar').style.width=pct+'%';
    document.getElementById('fs-label').textContent='시청 중 ('+fmtSec(t)+')';
    // 카드 진행바 업데이트
    const cpf=document.getElementById('cpf-'+currentIndex);
    if(cpf)cpf.style.width=pct+'%';
    if(!completed&&dur>0&&maxReachedSec>=dur*.95)triggerComplete();
  }
  if(ev==='seek'){
    if(jumpBlock)return;
    const tg=parseFloat(d.data.seconds)||0,dur=parseFloat(d.data.duration)||videoDuration;
    if(!(dur>0&&maxReachedSec>=dur*.95)&&tg>maxReachedSec+3)blockJump(isFs);
  }
  if(ev==='finish'){isPlaying=false;if(!completed)triggerComplete();}
});

function triggerComplete(){
  completed=true;
  // 진도 맵에 completed 플래그 저장
  if(currentVideo){
    if(!progressMap[currentVideo.id])progressMap[currentVideo.id]={lastPosition:0,maxReached:0,duration:0};
    progressMap[currentVideo.id].completed=true;
  }
  document.getElementById('complete-box').classList.add('show');
  document.getElementById('watch-bar').style.width='100%';
  document.getElementById('watch-pct').textContent='100%';
  document.getElementById('watch-label').textContent='✅ 시청 완료';
  document.getElementById('fs-watch-bar').style.width='100%';
  document.getElementById('fs-label').textContent='✅ 시청 완료';
  document.getElementById('fs-complete').style.display='block';
  // 🎉 컨페티 발사!
  launchConfetti();
  // 카드 즉시 완료 표시
  const card=document.getElementById('vc-'+currentIndex);
  if(card){
    card.classList.add('done');
    card.classList.remove('watching');
    // ✓ 배지 추가 (없으면)
    if(!card.querySelector('.v-badge-done')){
      const badge=document.createElement('div');
      badge.className='v-badge-done';badge.textContent='✓';
      card.appendChild(badge);
    }
    // 시청중 배지 제거
    const wb=card.querySelector('.v-badge-watching');
    if(wb)wb.remove();
  }
  const cpf=document.getElementById('cpf-'+currentIndex);
  if(cpf){cpf.style.width='100%';cpf.style.background='var(--green)';}
  saveRecord(true);saveProgress();updateStats();
  // 완료된 강의를 이어보기 행에서 제거
  renderRecentRow();
  // A. 다음 강의 추천
  showNextVideoBtn();
}
function blockJump(isFs=false){
  if(jumpBlock)return;jumpBlock=true;
  sendPlayer('setCurrentTime',maxReachedSec,isFs);
  document.getElementById('block-box').classList.add('show');
  setTimeout(()=>{document.getElementById('block-box').classList.remove('show');jumpBlock=false;},1800);
}
function sendPlayer(method,value,isFs=false){
  const id=isFs?'fs-player':'vimeo-player';
  const iframe=document.getElementById(id);
  if(!iframe?.contentWindow)return;
  iframe.contentWindow.postMessage(JSON.stringify(value!=null?{method,value}:{method}),'https://player.vimeo.com');
}

/* ─ SAVE ─ */
function saveRecord(isFinal=true){
  if(!userName||!currentVideo)return;
  if(recordSent)return;if(isFinal)recordSent=true;
  fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type:'record',name:userName,videoTitle:currentVideo.title,
      date:currentVideo.date||'',lecturer:currentVideo.lecturer||'',startTime,completed,
      watchedMinutes:Math.round(maxReachedSec/60*10)/10,replayCount})}).catch(()=>{});
}
function saveProgress(){
  if(!userName||!currentVideo)return;
  if(!progressMap[currentVideo.id])progressMap[currentVideo.id]={lastPosition:0,maxReached:0,duration:0};
  progressMap[currentVideo.id].lastPosition=Math.floor(lastPositionSec);
  progressMap[currentVideo.id].maxReached=Math.floor(maxReachedSec);
  if(videoDuration>0)progressMap[currentVideo.id].duration=Math.floor(videoDuration);
  fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type:'progress',name:userName,videoId:currentVideo.id,
      lastPosition:Math.floor(lastPositionSec),maxReached:Math.floor(maxReachedSec),
      duration:Math.floor(videoDuration||0)})}).catch(()=>{});
}
window.addEventListener('beforeunload',()=>{if(userName&&currentVideo&&maxReachedSec>5){saveRecord(true);saveProgress();}});
window.addEventListener('pagehide',()=>{if(userName&&currentVideo&&maxReachedSec>5){saveRecord(true);saveProgress();}});
window.addEventListener('scroll',()=>{
  document.getElementById('gf-header').classList.toggle('solid',window.scrollY>60);
},{passive:true});
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('detail-modal').classList.contains('show'))closeDetail();
    else closePlayer();
  }
});

/* ═══════════════════════════
   2. 상세 정보 모달
═══════════════════════════ */
let detailIndex = -1;

function openDetail(index) {
  if (!VIDEOS.length || index < 0) return;
  detailIndex = index;
  const v = VIDEOS[index];
  const prog = progressMap[v.id];
  const maxR = prog ? (parseFloat(prog.maxReached)||0) : 0;
  const dur  = prog ? (parseFloat(prog.duration)||0)  : 0;
  const pct  = dur > 0 ? Math.min(Math.round(maxR/dur*100), 100) : 0;
  const parsed = parseTitle(v.title);

  // 썸네일
  const thumb = document.getElementById('detail-thumb');
  if (v.thumbnail) {
    thumb.style.backgroundImage = `url('${v.thumbnail}')`;
    thumb.style.backgroundSize = 'cover';
    thumb.style.backgroundPosition = 'center';
  } else {
    const colors = {초등:'#051525',중등:'#051a0f',고등:'#1a0505'};
    const g = detectGrade(v);
    thumb.style.backgroundImage = `radial-gradient(ellipse at 60% 40%, ${colors[g]||'#1a1a1a'} 0%, #141414 100%)`;
  }

  document.getElementById('detail-title-sub').textContent = parsed.sub;
  document.getElementById('detail-title-main').textContent = parsed.main || v.title;

  let meta = [];
  if (v.date) meta.push('📅 ' + fmtDate(v.date));
  if (v.lecturer) meta.push('👤 ' + v.lecturer);
  const grade = detectGrade(v);
  meta.push('📚 ' + grade + ' 과정');
  document.getElementById('detail-meta').textContent = meta.join('  ·  ');

  document.getElementById('detail-desc').textContent =
    v.description || (parsed.main + ' 강의입니다. 시청한 지점 이후로 앞으로 건너뛸 수 없습니다.');

  // 진도 표시
  const progBox = document.getElementById('detail-progress');
  if (maxR > 10) {
    progBox.style.display = 'block';
    const isDone = prog && (prog.completed || (maxR > 30 && pct >= 90));
    document.getElementById('detail-prog-label').textContent =
      isDone ? '✅ 시청 완료' : '▶ ' + fmtSec(maxR) + '까지 시청';
    document.getElementById('detail-prog-pct').textContent = isDone ? '100%' : pct + '%';
    const fill = document.getElementById('detail-prog-fill');
    fill.style.width = (isDone ? 100 : pct) + '%';
    fill.style.background = isDone ? 'var(--green)' : '';
  } else {
    progBox.style.display = 'none';
  }

  // 재생 버튼 텍스트
  const playBtn = document.getElementById('detail-play-btn');
  playBtn.childNodes[playBtn.childNodes.length-1].textContent =
    maxR > 10 ? ' 이어보기' : ' 재생';

  document.getElementById('detail-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-modal').classList.remove('show');
  document.body.style.overflow = '';
}

function playFromDetail() {
  closeDetail();
  if (detailIndex >= 0) selectVideo(detailIndex);
}

/* ═══════════════════════════
   3. 최근 본 강의 행 (히어로 바로 아래)
═══════════════════════════ */
function renderRecentRow() {
  const container = document.getElementById('recent-row-wrap');
  if (!container) return;

  // 이어보기: 시청 중이지만 완료는 아닌 강의만
  const recent = VIDEOS.filter(v => {
    const p = progressMap[v.id];
    if (!p) return false;
    const maxR = parseFloat(p.maxReached) || 0;
    if (maxR <= 30) return false; // 거의 안 본 것 제외
    // 완료된 강의 제외
    const dur  = parseFloat(p.duration) || 0;
    const isDone = p.completed || (dur > 0 && maxR / dur >= 0.9);
    return !isDone;
  });

  if (!recent.length) { container.style.display = 'none'; return; }

  container.style.display = 'block';
  const globalIdx = v => VIDEOS.indexOf(v);
  const row = makeRow(
    userName ? `<em>${userName}</em> 님의 이어보기` : '이어보기',
    recent, globalIdx
  );
  container.innerHTML = '';
  if (row) container.appendChild(row);
}

/* ══════════════════════════════════
   4. 비밀번호 변경
══════════════════════════════════ */
function openPwModal(){
  if(!userName){showToast('로그인 후 이용하세요');return;}
  ['pw-current','pw-new','pw-confirm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pw-err').style.display='none';
  document.getElementById('pw-modal').classList.add('show');
}
function closePwModal(){
  document.getElementById('pw-modal').classList.remove('show');
}
async function changePw(){
  const cur=document.getElementById('pw-current').value.trim();
  const nw=document.getElementById('pw-new').value.trim();
  const cf=document.getElementById('pw-confirm').value.trim();
  const err=document.getElementById('pw-err');
  err.style.display='none';
  if(!cur||!nw||!cf){err.textContent='모든 항목을 입력해 주세요.';err.style.display='block';return;}
  if(nw!==cf){err.textContent='새 비밀번호가 일치하지 않습니다.';err.style.display='block';return;}
  if(nw.length<4){err.textContent='비밀번호는 4자 이상이어야 합니다.';err.style.display='block';return;}
  // 현재 비번 확인
  const matched=studentList.find(s=>{
    const id=(s.id||s.name||s);
    const pw=String(s.password||'');
    return (id===userName||s.name===userName)&&pw===cur;
  });
  if(!matched&&studentList.length>0){
    err.textContent='현재 비밀번호가 올바르지 않습니다.';err.style.display='block';return;
  }
  try{
    const r=await gasApi({action:'change_password',name:userName,current:cur,newpw:nw});
    if(r&&r.success){
      closePwModal();
      showToast('✅ 비밀번호가 변경되었습니다.');
      // 로컬 studentList 업데이트
      const stu=studentList.find(s=>s.name===userName||s.id===userName);
      if(stu)stu.password=nw;
    }else{
      err.textContent='❌ '+(r&&r.error?r.error:'변경 실패');err.style.display='block';
    }
  }catch(e){err.textContent='❌ '+e.message;err.style.display='block';}
}

/* ══════════════════════════════════
   5. 히어로 자동 전환 (Auto-carousel)
══════════════════════════════════ */
let _heroTimer=null, _heroIdx=0, _heroList=[];

function initHeroCarousel(){
  clearInterval(_heroTimer);
  _heroList=VIDEOS.filter(v=>v.thumbnail); // 썸네일 있는 것만
  if(_heroList.length<=1){
    document.getElementById('hero-dots').innerHTML='';
    return;
  }
  // 도트 생성
  const dots=document.getElementById('hero-dots');
  dots.innerHTML=_heroList.map((_,i)=>
    `<button class="hero-dot${i===0?' active':''}" onclick="jumpHero(${i})"></button>`
  ).join('');
  _heroIdx=0;
  _heroTimer=setInterval(()=>nextHero(),6000);
}
function nextHero(){
  _heroIdx=(_heroIdx+1)%_heroList.length;
  const realIdx=VIDEOS.indexOf(_heroList[_heroIdx]);
  if(realIdx>=0)updateFeatured(realIdx);
  updateHeroDots();
}
function jumpHero(i){
  _heroIdx=i;
  clearInterval(_heroTimer);
  _heroTimer=setInterval(()=>nextHero(),6000);
  const realIdx=VIDEOS.indexOf(_heroList[_heroIdx]);
  if(realIdx>=0)updateFeatured(realIdx);
  updateHeroDots();
}
function updateHeroDots(){
  document.querySelectorAll('.hero-dot').forEach((d,i)=>
    d.classList.toggle('active',i===_heroIdx));
}

   6. 강의 정렬
══════════════════════════════════ */
const SORT_ORDERS=['date-desc','date-asc','title-asc'];
const SORT_LABELS={'date-desc':'최신순','date-asc':'오래된순','title-asc':'제목순'};
let currentSort='date-desc';

function cycleSortOrder(){
  const idx=(SORT_ORDERS.indexOf(currentSort)+1)%SORT_ORDERS.length;
  currentSort=SORT_ORDERS[idx];
  document.getElementById('sort-label').textContent=SORT_LABELS[currentSort];
  sortVideos();
  renderCatalog();
  initHeroCarousel();
}
function sortVideos(){
  VIDEOS.sort((a,b)=>{
    if(currentSort==='date-desc') return (b.date||'').localeCompare(a.date||'');
    if(currentSort==='date-asc')  return (a.date||'').localeCompare(b.date||'');
    if(currentSort==='title-asc') return (a.title||'').localeCompare(b.title||'','ko');
    return 0;
  });
}

/* ════════════════════════════
   3. 컨페티 애니메이션
════════════════════════════ */
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  if(!canvas)return;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  canvas.classList.add('active');
  const ctx=canvas.getContext('2d');

  const COLORS=['#E50914','#46d369','#f5c518','#4a9eff','#ffffff','#ff6b35'];
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height-canvas.height,
    w:Math.random()*10+5,
    h:Math.random()*6+3,
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    angle:Math.random()*360,
    speed:Math.random()*3+2,
    spin:Math.random()*6-3,
    sway:Math.random()*2-1,
    swaySpeed:Math.random()*.05+.02,
    swayOffset:Math.random()*Math.PI*2,
  }));

  let frame=0,raf;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.y+=p.speed;
      p.x+=Math.sin(p.swayOffset+frame*p.swaySpeed)*p.sway;
      p.angle+=p.spin;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.globalAlpha=Math.max(0,1-(p.y/canvas.height));
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(frame<180)raf=requestAnimationFrame(draw);
    else{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      canvas.classList.remove('active');
    }
  }
  raf=requestAnimationFrame(draw);
  // 3초 후 강제 종료 (안전장치)
  setTimeout(()=>{
    cancelAnimationFrame(raf);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    canvas.classList.remove('active');
  },3200);
}

/* ════════════════════════════
   A. 다음 강의 자동 추천
════════════════════════════ */
let _autoPlayTimer = null;
let _autoPlayCancelled = false;

function showNextVideoBtn() {
  const btn    = document.getElementById('complete-next-btn');
  const sub    = document.getElementById('complete-next-sub');
  const cancel = document.getElementById('complete-cancel-btn');
  if (!btn || !sub) return;

  // 같은 과정 내 다음 미완료 강의
  const curGrade  = detectGrade(currentVideo);
  const sameGrade = VIDEOS.filter(v => detectGrade(v) === curGrade);
  const curPos    = sameGrade.findIndex(v => v.id === currentVideo.id);
  let nextVideo   = null;
  for (let i = curPos + 1; i < sameGrade.length; i++) {
    const p = progressMap[sameGrade[i].id];
    const dur = parseFloat(p?.duration) || 0, maxR = parseFloat(p?.maxReached) || 0;
    if (!(p?.completed || (dur > 0 && maxR / dur >= 0.9))) { nextVideo = sameGrade[i]; break; }
  }
  if (!nextVideo) {
    nextVideo = VIDEOS.filter(v => v.id !== currentVideo.id).find(v => {
      const p = progressMap[v.id];
      const dur = parseFloat(p?.duration) || 0, maxR = parseFloat(p?.maxReached) || 0;
      return !(p?.completed || (dur > 0 && maxR / dur >= 0.9));
    });
  }

  if (nextVideo) {
    const parsed = parseTitle(nextVideo.title);
    btn._nextIdx = VIDEOS.indexOf(nextVideo);
    btn.style.display = 'block';
    if (cancel) cancel.style.display = 'block';
    sub.style.display = 'block';
    sub.style.color = 'rgba(70,211,105,.7)';
    sub.style.fontWeight = '400';
    sub.style.fontSize = '12px';

    // ④ 5초 카운트다운 자동재생
    _autoPlayCancelled = false;
    let remaining = 5;
    const updateLabel = () => {
      btn.textContent = `▶ 다음 강의 바로 보기 (${remaining}초 후 자동 재생)`;
      sub.textContent = '다음: ' + (parsed.sub ? parsed.sub + ' ' : '') + (parsed.main || nextVideo.title);
    };
    updateLabel();

    // CSS 카운트다운 바 시작
    btn.style.setProperty('--countdown-duration', '5s');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => btn.classList.add('counting'));
    });

    _autoPlayTimer = setInterval(() => {
      if (_autoPlayCancelled) { clearInterval(_autoPlayTimer); return; }
      remaining--;
      if (remaining <= 0) {
        clearInterval(_autoPlayTimer);
        playNextVideo();
      } else {
        updateLabel();
      }
    }, 1000);

  } else {
    // 모든 강의 완료
    btn.style.display = 'none';
    if (cancel) cancel.style.display = 'none';
    sub.style.display = 'block';
    sub.textContent = '🏆 모든 강의를 완료했습니다!';
    sub.style.color = 'var(--gold)';
    sub.style.fontWeight = '700';
    sub.style.fontSize = '14px';
  }
}

function playNextVideo() {
  const btn = document.getElementById('complete-next-btn');
  if (!btn || btn._nextIdx === undefined) return;
  clearInterval(_autoPlayTimer);
  btn.classList.remove('counting');
  closePlayer();
  setTimeout(() => selectVideo(btn._nextIdx), 300);
}

function cancelAutoPlay() {
  _autoPlayCancelled = true;
  clearInterval(_autoPlayTimer);
  const btn    = document.getElementById('complete-next-btn');
  const cancel = document.getElementById('complete-cancel-btn');
  const sub    = document.getElementById('complete-next-sub');
  if (btn) {
    btn.classList.remove('counting');
    btn.textContent = '▶ 다음 강의 바로 보기';
  }
  if (cancel) cancel.style.display = 'none';
  if (sub) {
    const parsed = btn?._nextIdx !== undefined ? parseTitle(VIDEOS[btn._nextIdx]?.title||'') : null;
    if (parsed) sub.textContent = '다음: ' + (parsed.sub ? parsed.sub + ' ' : '') + (parsed.main || '');
  }
}

/* ════════════════════════════
   B. PWA — 홈화면 추가 안내
════════════════════════════ */
let _deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // 로그인 후 3초 뒤에 안내 토스트 표시
  setTimeout(showPwaPrompt, 3000);
});

function showPwaPrompt() {
  // 이미 설치됐거나 표시한 적 있으면 스킵
  if (localStorage.getItem('pwa_prompted')) return;
  if (window.matchMedia('(display-mode: standalone)').matches) return;

  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.innerHTML = '📱 홈화면에 추가하면 앱처럼 사용할 수 있어요 &nbsp;<button onclick="installPwa()" style="background:var(--white);color:var(--black);border:none;border-radius:4px;padding:3px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">추가하기</button>';
  toast.classList.add('show');
  // 8초 후 자동 숨김
  setTimeout(() => {
    toast.classList.remove('show');
    toast.textContent = '';
    localStorage.setItem('pwa_prompted', '1');
  }, 8000);
}

async function installPwa() {
  document.getElementById('toast').classList.remove('show');
  if (_deferredPrompt) {
    _deferredPrompt.prompt();
    const { outcome } = await _deferredPrompt.userChoice;
    _deferredPrompt = null;
    if (outcome === 'accepted') showToast('✅ 홈화면에 추가됐습니다!');
    localStorage.setItem('pwa_prompted', '1');
  } else {
    // iOS는 beforeinstallprompt 미지원 — 수동 안내
    showIosInstallGuide();
  }
}

function showIosInstallGuide() {
  const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
  if (!isIos) { showToast('브라우저 메뉴에서 "홈 화면에 추가"를 선택하세요.'); return; }
  // iOS 전용 안내 모달
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:99999;display:flex;align-items:flex-end;padding:0;backdrop-filter:blur(6px);';
  overlay.innerHTML = `
    <div style="background:#1f1f1f;border-radius:16px 16px 0 0;padding:24px;width:100%;animation:slideUp .3s cubic-bezier(.16,1,.3,1);">
      <div style="font-size:17px;font-weight:700;margin-bottom:6px;">📱 홈화면에 추가하기</div>
      <div style="font-size:13px;color:var(--g2);line-height:1.7;margin-bottom:20px;">
        1. 하단 <strong style="color:var(--white)">공유 버튼</strong> 탭 <span style="font-size:16px">⎋</span><br>
        2. 스크롤해서 <strong style="color:var(--white)">"홈 화면에 추가"</strong> 선택<br>
        3. <strong style="color:var(--white)">"추가"</strong> 탭
      </div>
      <button onclick="this.closest('[style]').remove();localStorage.setItem('pwa_prompted','1')"
        style="width:100%;background:var(--red);color:var(--white);border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;">확인</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e => { if(e.target===overlay){overlay.remove();localStorage.setItem('pwa_prompted','1');} };
}

init();
